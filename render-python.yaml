services:
  # Python Flask API (Port 5000)
  - type: web
    name: beyondwords-python
    env: python
    plan: starter
    buildCommand: |
      apt-get update && apt-get install -y espeak-ng
      pip install -r requirements-simple.txt --no-cache-dir
    startCommand: gunicorn python_api:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --keep-alive 5 --preload
    envVars:
      - key: PORT
        value: 5000
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false 